    <style>
        /* 快速聯絡區塊樣式 */
.quick-contact-section {
    background-color: #ffffff;
    border-top: 1px solid #f0f0f0;
}

.contact-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-decoration: none !important;
    background: #fff;
    border-radius: 12px;
    transition: all 0.4s ease;
    text-align: center;
    border: 1px solid #eee; /* 預設淡色邊框 */
}

/* 懸浮時的動態效果 */
.contact-box:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}

/* 各自的主題色設定 */
.border-orange:hover { border-color: #d35400; }
.border-blue:hover   { border-color: #2980b9; }
.border-dark:hover   { border-color: #333333; }

/* 圓圈圖示樣式 */
.contact-icon-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 20px;
    transition: 0.3s;
}

.icon-orange { background: #fff5eb; color: #d35400; }
.icon-blue   { background: #ebf5ff; color: #2980b9; }
.icon-dark   { background: #f5f5f5; color: #333333; }

.contact-box h4 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #222;
    margin-bottom: 10px;
}

.contact-box p {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 0;
}
        /* 大氣橫式資訊列專屬樣式 */
        .info-bar-large {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            /* 增加內邊距，讓它更寬大 */
            box-shadow: 0 20px 40px rgba(26, 43, 72, 0.08);
            /* 深邃柔和的陰影 */
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-around;
            border: 1px solid #f0f0f0;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
        }

        .info-item i {
            font-size: 2rem;
            /* 圖示放大 */
            color: var(--accent-gold);
        }

        .info-item span {
            display: block;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-item strong {
            display: block;
            font-size: 1.25rem;
            /* 文字放大 */
            color: var(--primary-navy);
            font-weight: 700;
        }

        /* 自定義分隔線（電腦版顯示） */
        @media (min-width: 992px) {
            .border-start-custom {
                border-left: 1px solid #eee;
                padding-left: 40px;
            }
        }

        /* 巨型按鈕樣式 */
        .btn-register-lg {
            background: var(--primary-navy);
            color: white ! important;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(26, 43, 72, 0.2);
        }

        .btn-register-lg:hover {
            background: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.3);
        }

        /* 手機版適配：變成垂直堆疊 */
        @media (max-width: 991px) {
            .info-bar-large {
                padding: 30px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 25px;
            }

            .info-item {
                padding: 0;
            }

            .info-action {
                width: 100%;
                margin-top: 10px;
            }

            .btn-register-lg {
                width: 100%;
                text-align: center;
            }
        }

        :root {
            --bg-light: #f8f9fa;
            --primary-navy: #1a2b48;
            --accent-gold: #c5a059;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;

        /* 導覽列 */

            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;

        .content-section {

        }

        .info-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid #eee;

        .back-btn {

            text-decoration: none;

            display: inline-flex;
            align-items: center;
            transition: 0.3s;

        .register-btn {

            color: white;
            padding: 15px 40px;
            border-radius: 0;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .register-btn:hover {
            background: var(--accent-gold);
            color: white;
        }
    </style>
