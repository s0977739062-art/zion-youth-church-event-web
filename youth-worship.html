<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動詳情 | Ignite Youth</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg-light: #f8f9fa;
            --primary-navy: #1a2b48;
            --accent-gold: #c5a059;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff; color: #333; padding-top: 70px; }

        /* 導覽列 */
        .navbar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }

        /* 活動首圖 (內頁專用：較矮且細緻) */
        .activity-hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('images/封面.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .content-section { padding: 80px 0; }
        
        .info-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid #eee;
        }

        .back-btn {
            color: var(--primary-navy);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--accent-gold); transform: translateX(-5px); }

        .register-btn {
            background: var(--primary-navy);
            color: white;
            padding: 15px 40px;
            border-radius: 0;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .register-btn:hover { background: var(--accent-gold); color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: var(--primary-navy);">Zion Youth Church</a>
            <a href="index.html" class="back-btn"><i class="bi bi-arrow-left me-2"></i>返回主頁</a>
        </div>
    </nav>

    <header class="activity-hero" data-aos="fade">
        <div class="container">
            <h1 class="display-4 fw-bold">週日青年聚會</h1>
            <p class="lead">SUNDAY YOUTH MEETING</p>
        </div>
    </header>

    <section class="content-section">
        <div class="container">
            <div class="row g-5">
                <div class="col-lg-8 order-2 order-lg-1" data-aos="fade-right">
                    <h2 class="fw-bold mb-4">關於這個活動</h2>
                    <p class="fs-5 text-muted mb-4">
                        這裡是活動的詳細介紹文案。佳恩，身為導演，你可以發揮你的說故事能力，
                        描述這個活動能帶給年輕人什麼樣的感動與成長。
                    </p>
                    <img src="images/封面.jpg" class="img-fluid rounded-4 mb-4 shadow" alt="活動剪影">
                    <h3 class="fw-bold mt-5 mb-3">活動特色</h3>
                    <ul class="list-unstyled fs-5">
                        <li class="mb-2"><i class="bi bi-check2-circle text-success me-2"></i> 專業音樂敬拜團隊</li>
                        <li class="mb-2"><i class="bi bi-check2-circle text-success me-2"></i> 真實且深度的生命分享</li>
                        <li class="mb-2"><i class="bi bi-check2-circle text-success me-2"></i> 溫馨的社群小組交流</li>
                    </ul>
                </div>

                <div class="col-lg-4 order-1 order-lg-2" data-aos="fade-left">
                    <div class="info-card sticky-top" style="top: 100px;">
                        <h4 class="fw-bold mb-4">活動資訊</h4>
                        <div class="mb-3 d-flex">
                            <i class="bi bi-calendar3 me-3 text-primary"></i>
                            <div><strong>時間：</strong><br>每週日 10:00 - 12:00</div>
                        </div>
                        <div class="mb-3 d-flex">
                            <i class="bi bi-geo-alt me-3 text-danger"></i>
                            <div><strong>地點：</strong><br>教會二樓大會堂</div>
                        </div>
                        <div class="mb-4 d-flex">
                            <i class="bi bi-people me-3 text-info"></i>
                            <div><strong>對象：</strong><br>15 - 30 歲青年</div>
                        </div>
                        <hr>
                        <a href="#" class="register-btn w-100 text-center">立即線上報名</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 bg-white border-top text-center">
        <p class="text-muted small">© 2026 青年教會活動</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
