<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週日青年聚會</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>

        /* 大氣橫式資訊列專屬樣式 */
.info-bar-large {
    background: #ffffff;
    border-radius: 24px;
    padding: 40px; /* 增加內邊距，讓它更寬大 */
    box-shadow: 0 20px 40px rgba(26, 43, 72, 0.08); /* 深邃柔和的陰影 */
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-around;
    border: 1px solid #f0f0f0;
}

.info-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 20px;
}

.info-item i {
    font-size: 2rem; /* 圖示放大 */
    color: var(--accent-gold);
}

.info-item span {
    display: block;
    font-size: 0.85rem;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.info-item strong {
    display: block;
    font-size: 1.25rem; /* 文字放大 */
    color: var(--primary-navy);
    font-weight: 700;
}

/* 自定義分隔線（電腦版顯示） */
@media (min-width: 992px) {
    .border-start-custom {
        border-left: 1px solid #eee;
        padding-left: 40px;
    }
}

/* 巨型按鈕樣式 */
.btn-register-lg {
    background: var(--primary-navy);
    color: white !  important;
    padding: 18px 45px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    display: inline-block;
    box-shadow: 0 10px 20px rgba(26, 43, 72, 0.2);
}

.btn-register-lg:hover {
    background: var(--accent-gold);
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(197, 160, 89, 0.3);
}

/* 手機版適配：變成垂直堆疊 */
@media (max-width: 991px) {
    .info-bar-large {
        padding: 30px 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 25px;
    }
    .info-item { padding: 0; }
    .info-action { width: 100%; margin-top: 10px; }
    .btn-register-lg { width: 100%; text-align: center; }
}
        :root {
            --bg-light: #f8f9fa;
            --primary-navy: #1a2b48;
            --accent-gold: #c5a059;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff; color: #333; padding-top: 70px; }

        /* 導覽列 */
        .navbar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }

        /* 活動首圖 (內頁專用：較矮且細緻) */
        .activity-hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('images/LINE_ALBUM_2026.01.11-01.17聚會相片_260214_2.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .content-section { padding: 50px 0; }
        
        .info-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid #eee;
        }

        .back-btn {
            color: var(--primary-navy);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--accent-gold); transform: translateX(-5px); }

        .register-btn {
            background: var(--primary-navy);
            color: white;
            padding: 15px 40px;
            border-radius: 0;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .register-btn:hover { background: var(--accent-gold); color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: var(--primary-navy);">Zion Youth Church</a>
            <a href="index.html" class="back-btn"><i class="bi bi-arrow-left me-2"></i>返回主頁</a>
        </div>
    </nav>

    <header class="activity-hero" data-aos="fade">
        <div class="container">
            <h1 class="display-4 fw-bold">週日青年聚會</h1>
            <p class="lead">SUNDAY YOUTH MEETING</p>
        </div>
    </header>

    <section class="content-section">
        <div class="container">
            <div class="row g-8">
                <div class="col-lg-8 order-2 order-lg-1" data-aos="fade-right">
                    <h2 class="fw-bold mb-4">一起認識神<br>
一起互相陪伴<br>
在信仰中同行</h2>
                    
                    <img src="images/LINE_ALBUM_2026.01.04-01.10聚會、活動照片_260328_1.jpg" class="img-fluid rounded-4 mb-4 shadow" alt="活動剪影">
                    <h3 class="fw-bold mt-5 mb-3">點心時間</h3>
                    <div class="row g-3 mt-5">
                        
    <div class="col-md-8" data-aos="zoom-in">
        <div class="gallery-item">
            <img src="images/LINE_ALBUM_20260208_260402_1.jpg" class="img-fluid rounded-4 shadow-sm h-100 object-fit-cover" alt="大圖">
        </div>
    </div>
    <div class="col-md-4">
        <div class="row g-3">
            <div class="col-12" data-aos="zoom-in" data-aos-delay="100">
                <div class="gallery-item">
                    <img src="images/LINE_ALBUM_2029315_260402_1.jpg" class="img-fluid rounded-4 shadow-sm" alt="小圖上">
                </div>
            </div>
            <div class="col-12" data-aos="zoom-in" data-aos-delay="200">
                <div class="gallery-item">
                    <img src="images/LINE_ALBUM_2025112_260402_1.jpg" class="img-fluid rounded-4 shadow-sm" alt="小圖下">
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .gallery-item {
        overflow: hidden;
        border-radius: 16px;
        height: 100%;
    }
    .gallery-item img {
        transition: transform 0.5s ease;
        cursor: pointer;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .gallery-item:hover img {
        transform: scale(1.05); /* 滑過時微微放大，很有電影感 */
    }
</style>
                   
                </div>

                <div class="container mb-5">
   <div class="row mb-5 justify-content-center" data-aos="fade-up">
    <div class="col-12">
        <div class="info-bar-large">
            <div class="info-item">
                <i class="bi bi-calendar3"></i>
                <div>
                    <span>活動時間</span>
                    <strong>每週日 14:00 - 15:30</strong>
                </div>
            </div>
            <div class="info-item border-start-custom">
                <i class="bi bi-geo-alt"></i>
                <div>
                    <span>集合地點</span>
                    <strong> 教會七樓</strong>
                </div>
            </div>
            <div class="info-item border-start-custom">
                <i class="bi bi-people"></i>
                <div>
                    <span>邀請對象</span>
                    <strong>國中 ～ 社青階段</strong>
                </div>
            </div>
            
        </div>
    </div>
</div>
</div>
            </div>
        </div>
    </section>
    

    <footer class="py-5 bg-white border-top text-center">
        <p class="text-muted small">© 2026 青年教會活動</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
