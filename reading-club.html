<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週二讀書會</title>


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Noto+Sans+TC:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* 快速聯絡區塊樣式 */
        .quick-contact-section {
            background-color: #ffffff;
            border-top: 1px solid #f0f0f0;
        }

        .contact-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-decoration: none !important;
            background: #fff;
            border-radius: 12px;
            transition: all 0.4s ease;
            text-align: center;
            border: 1px solid #eee;
            /* 預設淡色邊框 */
        }

        /* 懸浮時的動態效果 */
        .contact-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
        }

        /* 各自的主題色設定 */
        .border-orange:hover {
            border-color: #d35400;
        }

        .border-blue:hover {
            border-color: #2980b9;
        }

        .border-dark:hover {
            border-color: #333333;
        }

        /* 圓圈圖示樣式 */
        .contact-icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .icon-orange {
            background: #fff5eb;
            color: #d35400;
        }

        .icon-blue {
            background: #ebf5ff;
            color: #2980b9;
        }

        .icon-dark {
            background: #f5f5f5;
            color: #333333;
        }

        .contact-box h4 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 10px;
        }

        .contact-box p {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0;
        }

        /* 大氣橫式資訊列專屬樣式 */
        .info-bar-large {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            /* 增加內邊距，讓它更寬大 */
            box-shadow: 0 20px 40px rgba(26, 43, 72, 0.08);
            /* 深邃柔和的陰影 */
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-around;
            border: 1px solid #f0f0f0;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
        }

        .info-item i {
            font-size: 2rem;
            /* 圖示放大 */
            color: var(--accent-gold);
        }

        .info-item span {
            display: block;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-item strong {
            display: block;
            font-size: 1.25rem;
            /* 文字放大 */
            color: var(--primary-navy);
            font-weight: 700;
        }

        /* 自定義分隔線（電腦版顯示） */
        @media (min-width: 992px) {
            .border-start-custom {
                border-left: 1px solid #eee;
                padding-left: 40px;
            }
        }

        /* 巨型按鈕樣式 */
        .btn-register-lg {
            background: var(--primary-navy);
            color: white ! important;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(26, 43, 72, 0.2);
        }

        .btn-register-lg:hover {
            background: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.3);
        }

        /* 手機版適配：變成垂直堆疊 */
        @media (max-width: 991px) {
            .info-bar-large {
                padding: 30px 20px;
                flex-direction: column;
                align-items: flex-start;
                gap: 25px;
            }

            .info-item {
                padding: 0;
            }

            .info-action {
                width: 100%;
                margin-top: 10px;
            }

            .btn-register-lg {
                width: 100%;
                text-align: center;
            }
        }

        :root {
            --bg-light: #f8f9fa;
            --primary-navy: #1a2b48;
            --accent-gold: #c5a059;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fff;
            color: #333;
            padding-top: 70px;
        }

        /* 導覽列 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #eee;
        }

        /* 活動首圖 (內頁專用：較矮且細緻) */
        .activity-hero {
            height: 40vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), url('images/LINE_ALBUM_週二讀書會照片_260328_1.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .content-section {
            padding: 50px 0;
        }

        .info-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid #eee;
        }

        .back-btn {
            color: var(--primary-navy);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: var(--accent-gold);
            transform: translateX(-5px);
        }

        .register-btn {
            background: var(--primary-navy);
            color: white;
            padding: 15px 40px;
            border-radius: 0;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .register-btn:hover {
            background: var(--accent-gold);
            color: white;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: var(--primary-navy);">Zion Youth Church</a>
            <a href="index.html" class="back-btn"><i class="bi bi-arrow-left me-2"></i>返回主頁</a>
        </div>
    </nav>

    <header class="activity-hero" data-aos="fade">
        <div class="container">
            <h1 class="display-4 fw-bold">週二讀書會</h1>
            <p class="lead">一起讀書，更有動力</p>
        </div>
    </header>

    <section class="content-section">
        <div class="container">

                <div class="col-lg-12 order-2 order-lg-1" data-aos="fade-right">
                    <h2 class="fw-bold mt-5 mb-3">我們一起讀書、一起進步，讓學習不再是孤軍奮戰。</h2>


                    <div class="row g-3 mt-5">
                        <div class="col-md-4">
                            <div class="row g-3">
                                <div class="col-12" data-aos="zoom-in" data-aos-delay="100">
                                    <div class="gallery-item">
                                        <img src="images/246A85E9-5DE1-4D5E-A1EE-0B54C4B8EDA2.jpg"
                                            class="img-fluid rounded-4 shadow-sm" alt="小圖上">
                                    </div>
                                </div>
                                <div class="col-12" data-aos="zoom-in" data-aos-delay="200">
                                    <div class="gallery-item">
                                        <img src="images/B27BFB65-D34B-401F-B4A4-833075F38223.jpg"
                                            class="img-fluid rounded-4 shadow-sm" alt="小圖下">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-8" data-aos="zoom-in">
                            <div class="gallery-item">
                                <img src="images/S__5931074.jpg"
                                    class="img-fluid rounded-4 shadow-sm h-100 object-fit-cover" alt="大圖">
                            </div>
                        </div>

                    </div>

                    <h4 class="fw-normal mb-5 mt-5">
                        不論是寫作業遇到難題，還是想找個安靜的地方讀書，這裡有專業的老師以及哥哥姐姐陪著你。
                    </h4>
                    <div class="row g-3 mt-5">

                        <div class="col-md-8" data-aos="zoom-in">
                            <div class="gallery-item">
                                <img src="images/421700D9-6759-4A59-B40B-E1ECE12CEA61.jpg"
                                    class="img-fluid rounded-4 shadow-sm h-100 object-fit-cover" alt="大圖">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="row g-3">
                                <div class="col-12" data-aos="zoom-in" data-aos-delay="100">
                                    <div class="gallery-item">
                                        <img src="images/LINE_ALBUM_週二讀書會照片_260328_1.jpg"
                                            class="img-fluid rounded-4 shadow-sm" alt="小圖上">
                                    </div>
                                </div>
                                <div class="col-12" data-aos="zoom-in" data-aos-delay="200">
                                    <div class="gallery-item">
                                        <img src="images/S__5931068.jpg" class="img-fluid rounded-4 shadow-sm"
                                            alt="小圖下">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <h2 class="fw-bold mt-5 mb-3">好吃晚餐，補充好體力</h2>
                    <div class="container my-5">
                        <div class="row g-3">
                            <div class="col-md-6" data-aos="fade-up">
                                <div class="dual-image-container">
                                    <img src="images/LINE_ALBUM_週二讀書會照片_260328_4.jpg"
                                        class="img-fluid rounded-4 shadow-sm" alt="活動截圖">
                                </div>
                            </div>
                            <div class="col-md-6" data-aos="fade-up" data-aos-delay="100">
                                <div class="dual-image-container">
                                    <img src="images/LINE_ALBUM_20250903_260403_1.jpg"
                                        class="img-fluid rounded-4 shadow-sm" alt="活動截圖">
                                </div>
                            </div>
                        </div>
                    </div>

                    <style>
                        .gallery-item {
                            overflow: hidden;
                            border-radius: 16px;
                            height: 100%;
                        }

                        .gallery-item img {
                            transition: transform 0.5s ease;
                            cursor: pointer;
                            width: 100%;
                            height: 100%;
                            object-fit: cover;
                        }

                        .gallery-item:hover img {
                            transform: scale(1.05);
                            /* 滑過時微微放大，很有電影感 */
                        }
                    </style>


                </div>

                <div class="container mb-5">
                    <div class="row mb-5 justify-content-center" data-aos="fade-up">
                        <div class="col-12">
                            <div class="info-bar-large">
                                <div class="info-item">
                                    <i class="bi bi-calendar3"></i>
                                    <div>
                                        <span>時間</span>
                                        <strong>每週二下午 5：30－9：00</strong>
                                    </div>
                                </div>
                                <div class="info-item border-start-custom">
                                    <i class="bi bi-geo-alt"></i>
                                    <div>
                                        <span>地點</span>
                                        <div class="d-flex align-items-center gap-2">
                                            <strong>教會五樓</strong>
                                            <a href="https://maps.app.goo.gl/nVMDaMR1PeWoUZRSA" target="_blank"
                                                class="btn btn-outline-success btn-sm rounded-pill py-0 px-2"
                                                style="font-size: 0.7rem; height: 20px; line-height: 18px;">
                                                點我導航
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="info-item border-start-custom">
                                    <i class="bi bi-people"></i>
                                    <div>
                                        <span>對象</span>
                                        <strong>國小 ～ 大學</strong>
                                    </div>
                                </div>
                                <div class="info-item border-start-custom">
                                    <i class="bi-egg-fried"></i>
                                    <div>
                                        <span>吃飽飽</span>
                                        <strong>提供免費晚餐</strong>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section id="contact" class="quick-contact-section py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-4" data-aos="fade-up">

                    <a href="https://line.me/R/ti/p/@356lmxoo?ts=03282137&oat_content=url"
                        class="contact-box border-orange">
                        <div class="contact-icon-circle icon-orange">
                            <i class="bi bi-question-lg"></i>
                        </div>
                        <h4>我要問問題</h4>
                        <p>對活動有疑問？點擊立即諮詢</p>
                    </a>
                </div>
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
                    <a href="https://maps.app.goo.gl/nVMDaMR1PeWoUZRSA" target="_blank" class="contact-box border-blue">
                        <div class="contact-icon-circle icon-blue">
                            <i class="bi bi-geo-alt-fill"></i>
                        </div>
                        <h4>我要導航</h4>
                        <p>活動地點地圖</p>
                    </a>
                </div>
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                    <a href="tel:3155571" class="contact-box border-dark">
                        <div class="contact-icon-circle icon-dark">
                            <i class="bi bi-telephone-fill"></i>
                        </div>
                        <h4>我要打電話</h4>
                        <p>緊急事項，直接撥打專線</p>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 bg-white border-top text-center">
        <p class="text-muted small">這裡是我們的家丨信仰讓我們發光</p>
    </footer>




    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>AOS.init({ duration: 1000 });</script>
</body>

</html>
